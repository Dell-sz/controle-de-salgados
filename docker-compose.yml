version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: universo_empada_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
    volumes:
      - ./backend:/app
      - ./backend/database:/app/database
      - app_node_modules:/app/node_modules
    working_dir: /app
    command: npm run dev

volumes:
  app_node_modules:

