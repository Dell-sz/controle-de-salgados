<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produção - Universo da Empada</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container-fluid">
            <a class="navbar-brand" href="dashboard.html">
                <i class="fas fa-utensils me-2"></i>Universo da Empada
            </a>
            <div class="d-flex">
                <span class="navbar-text me-3" id="usuarioNome"></span>
                <button class="btn btn-outline-light btn-sm" onclick="logout()">
                    <i class="fas fa-sign-out-alt me-1"></i> Sair
                </button>
            </div>
        </div>
    </nav>

    <div class="container-fluid p-4">
        <h2 class="mb-4"><i class="fas fa-industry text-success me-2"></i>Registro de Produção</h2>
        
        <div class="row">
            <div class="col-lg-8">
                <!-- Formulário de Produção -->
                <div class="card mb-4">
                    <div class="card-header bg-success text-white">
                        <h5 class="mb-0"><i class="fas fa-plus me-2"></i>Nova Produção</h5>
                    </div>
                    <div class="card-body">
                        <form id="producaoForm">
                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">Data</label>
                                    <input type="date" class="form-control" id="dataProducao" required>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">Massa Produzida (kg)</label>
                                    <input type="number" step="0.01" class="form-control" id="massaProduzida" required>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">Recheio Produzido (kg)</label>
                                    <input type="number" step="0.01" class="form-control" id="recheioProduzido" required>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Sobra Massa (kg)</label>
                                    <input type="number" step="0.01" class="form-control" id="sobraMassa" value="0">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Sobra Recheio (kg)</label>
                                    <input type="number" step="0.01" class="form-control" id="sobraRecheio" value="0">
                                </div>
                            </div>
                            
                            <hr>
                            <h6>Itens Produzidos</h6>
                            
                            <div class="row g-2 mb-3">
                                <div class="col-md-4">
                                    <select class="form-select" id="produtoSelect">
                                        <option value="">Selecione o produto</option>
                                    </select>
                                </div>
                                <div class="col-md-2">
                                    <input type="number" class="form-control" id="quantidadeItem" placeholder="Qtd">
                                </div>
                                <div class="col-md-2">
                                    <input type="number" step="0.01" class="form-control" id="massaItem" placeholder="Massa kg">
                                </div>
                                <div class="col-md-2">
                                    <input type="number" step="0.01" class="form-control" id="recheioItem" placeholder="Recheio kg">
                                </div>
                                <div class="col-md-2">
                                    <button type="button" class="btn btn-primary w-100" onclick="adicionarItem()">
                                        <i class="fas fa-plus"></i>
                                    </button>
                                </div>
                            </div>
                            
                            <!-- Tabela de Itens -->
                            <div class="table-responsive mb-3">
                                <table class="table table-sm" id="tabelaItens">
                                    <thead>
                                        <tr>
                                            <th>Produto</th>
                                            <th>Qtd</th>
                                            <th>Massa</th>
                                            <th>Recheio</th>
                                            <th></th>
                                        </tr>
                                    </thead>
                                    <tbody></tbody>
                                </table>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Observação</label>
                                <textarea class="form-control" id="observacao" rows="2"></textarea>
                            </div>
                            
                            <div class="d-grid">
                                <button type="submit" class="btn btn-success btn-lg">
                                    <i class="fas fa-save me-2"></i>Registrar Produção
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            
            <div class="col-lg-4">
                <!-- Lista de Produções Recentes -->
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0"><i class="fas fa-history me-2"></i>Produções Recentes</h5>
                    </div>
                    <div class="card-body p-0">
                        <div class="list-group list-group-flush" id="listaProducoes">
                            <div class="list-group-item text-center py-4">
                                <i class="fas fa-spinner fa-spin"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Verifica autenticação
        if (!checkAuth()) {
            // Redirecionado pelo checkAuth
        }
        
        document.getElementById('usuarioNome').textContent = JSON.parse(localStorage.getItem('usuario') || '{}').nome || '';
        
        // Setar data de hoje
        document.getElementById('dataProducao').valueAsDate = new Date();
        
        let itensProducao = [];
        
        document.addEventListener('DOMContentLoaded', () => {
            carregarProdutos();
            carregarProducoes();
            document.getElementById('producaoForm').addEventListener('submit', salvarProducao);
        });
        
        async function carregarProdutos() {
            try {
                const produtos = await api.get('/produtos');
                const select = document.getElementById('produtoSelect');
                select.innerHTML = '<option value="">Selecione o produto</option>' + 
                    produtos.map(p => `<option value="${p.id}">${p.nome}</option>`).join('');
            } catch (error) {
                console.error('Erro:', error);
            }
        }
        
        async function carregarProducoes() {
            try {
                const producoes = await api.get('/producoes');
                const lista = document.getElementById('listaProducoes');
                
                if (producoes.length === 0) {
                    lista.innerHTML = '<div class="list-group-item text-center py-4">Nenhuma produção</div>';
                    return;
                }
                
                lista.innerHTML = producoes.slice(0, 5).map(p => `
                    <div class="list-group-item">
                        <div class="d-flex justify-content-between">
                            <strong>${formatarData(p.data)}</strong>
                            <span class="badge bg-success">${p.massa_produzida}kg</span>
                        </div>
                        <small class="text-muted">${p.itens?.length || 0} itens</small>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Erro:', error);
            }
        }
        
        function adicionarItem() {
            const produtoId = document.getElementById('produtoSelect').value;
            const produtoNome = document.getElementById('produtoSelect').options[document.getElementById('produtoSelect').selectedIndex].text;
            const quantidade = parseInt(document.getElementById('quantidadeItem').value);
            const massa = parseFloat(document.getElementById('massaItem').value);
            const recheio = parseFloat(document.getElementById('recheioItem').value);
            
            if (!produtoId || !quantidade) {
                alert('Preencha produto e quantidade');
                return;
            }
            
            itensProducao.push({
                produto_id: parseInt(produtoId),
                produto_nome: produtoNome,
                quantidade: quantidade,
                massa_usada: massa || 0,
                recheio_usado: recheio || 0
            });
            
            atualizarTabelaItens();
            
            // Limpar campos
            document.getElementById('quantidadeItem').value = '';
            document.getElementById('massaItem').value = '';
            document.getElementById('recheioItem').value = '';
        }
        
        function atualizarTabelaItens() {
            const tbody = document.querySelector('#tabelaItens tbody');
            tbody.innerHTML = itensProducao.map((item, index) => `
                <tr>
                    <td>${item.produto_nome}</td>
                    <td>${item.quantidade}</td>
                    <td>${item.massa_usada} kg</td>
                    <td>${item.recheio_usado} kg</td>
                    <td>
                        <button class="btn btn-sm btn-danger" onclick="removerItem(${index})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }
        
        function removerItem(index) {
            itensProducao.splice(index, 1);
            atualizarTabelaItens();
        }
        
        async function salvarProducao(e) {
            e.preventDefault();
            
            if (itensProducao.length === 0) {
                alert('Adicione pelo menos um item à produção');
                return;
            }
            
            const dados = {
                data: document.getElementById('dataProducao').value,
                massa_produzida: parseFloat(document.getElementById('massaProduzida').value),
                recheio_produzido: parseFloat(document.getElementById('recheioProduzido').value),
                sobra_massa: parseFloat(document.getElementById('sobraMassa').value) || 0,
                sobra_recheio: parseFloat(document.getElementById('sobraRecheio').value) || 0,
                observacao: document.getElementById('observacao').value,
                itens: itensProducao
            };
            
            try {
                await api.post('/producoes', dados);
                alert('Produção registrada com sucesso!');
                
                // Limpar formulário
                document.getElementById('producaoForm').reset();
                document.getElementById('dataProducao').valueAsDate = new Date();
                itensProducao = [];
                atualizarTabelaItens();
                carregarProducoes();
            } catch (error) {
                alert('Erro: ' + error.message);
            }
        }
        
        function formatarData(dataStr) {
            if (!dataStr) return '';
            return new Date(dataStr).toLocaleDateString('pt-BR');
        }
    </script>
</body>
</html>
