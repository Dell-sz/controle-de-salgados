<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos - Universo da Empada</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container-fluid">
            <a class="navbar-brand" href="dashboard.html">
                <i class="fas fa-utensils me-2"></i>Universo da Empada
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-label="Abrir menu de navegação">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">
                            <i class="fas fa-home me-1"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="produtos.html">
                            <i class="fas fa-box me-1"></i> Produtos
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="producao.html">
                            <i class="fas fa-industry me-1"></i> Produção
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="clientes.html">
                            <i class="fas fa-users me-1"></i> Clientes
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="vendas.html">
                            <i class="fas fa-shopping-cart me-1"></i> Vendas
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="relatorios.html">
                            <i class="fas fa-chart-bar me-1"></i> Relatórios
                        </a>
                    </li>
                </ul>
                <div class="d-flex align-items-center">
                    <span class="navbar-text me-3" id="usuarioNome"></span>
                    <button class="btn btn-outline-light btn-sm" onclick="logout()">
                        <i class="fas fa-sign-out-alt me-1"></i> Sair
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container-fluid p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-box text-success me-2"></i>Produtos</h2>
            <button class="btn btn-success" onclick="abrirModalProduto()">
                <i class="fas fa-plus me-1"></i>Novo Produto
            </button>
        </div>

        <!-- Tabela de Produtos -->
        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover" id="tabelaProdutos">
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Valor Unit.</th>
                                <th>Estoque</th>
                                <th>Mínimo</th>
                                <th>Status</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td colspan="6" class="text-center py-4">Carregando...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Produto -->
    <div class="modal fade" id="produtoModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title" id="modalTitulo">Novo Produto</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Fechar"></button>
                </div>
                <form id="produtoForm">
                    <div class="modal-body">
                        <input type="hidden" id="produtoId">
                        <div class="mb-3">
                            <label class="form-label">Nome</label>
                            <input type="text" class="form-control" id="produtoNome" required
                                aria-label="Nome do produto">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Descrição</label>
                            <textarea class="form-control" id="produtoDescricao" rows="2"
                                aria-label="Descrição do produto"></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Valor Unitário (R$)</label>
                                <input type="number" step="0.01" class="form-control" id="produtoValor" required
                                    aria-label="Valor unitário">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Estoque Mínimo</label>
                                <input type="number" class="form-control" id="produtoEstoqueMinimo" value="5"
                                    aria-label="Estoque mínimo">
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-success">Salvar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Verifica autenticação
        if (!checkAuth()) {
            // Redirecionado pelo checkAuth
        }

        document.getElementById('usuarioNome').textContent = JSON.parse(localStorage.getItem('usuario') || '{}').nome || '';

        let produtoModal;

        document.addEventListener('DOMContentLoaded', () => {
            produtoModal = new bootstrap.Modal(document.getElementById('produtoModal'));
            carregarProdutos();
            document.getElementById('produtoForm').addEventListener('submit', salvarProduto);
        });

        async function carregarProdutos() {
            try {
                const produtos = await api.get('/produtos');
                const tbody = document.querySelector('#tabelaProdutos tbody');

                if (produtos.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4">Nenhum produto cadastrado</td></tr>';
                    return;
                }

                tbody.innerHTML = produtos.map(p => `
                    <tr>
                        <td><strong>${p.nome}</strong><br><small class="text-muted">${p.descricao || ''}</small></td>
                        <td>R$ ${parseFloat(p.valor_unitario).toFixed(2).replace('.', ',')}</td>
                        <td>${p.estoque_atual || 0}</td>
                        <td>${p.estoque_minimo || 5}</td>
                        <td>${p.ativo ? '<span class="badge bg-success">Ativo</span>' : '<span class="badge bg-secondary">Inativo</span>'}</td>
                        <td>
                            <button class="btn btn-sm btn-primary" onclick="editarProduto(${p.id}, '${p.nome}', '${p.descricao || ''}', ${p.valor_unitario}, ${p.estoque_minimo})">
                                <i class="fas fa-edit"></i>
                            </button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                alert('Erro ao carregar produtos: ' + error.message);
            }
        }

        function abrirModalProduto() {
            document.getElementById('produtoForm').reset();
            document.getElementById('produtoId').value = '';
            document.getElementById('modalTitulo').textContent = 'Novo Produto';
            produtoModal.show();
        }

        function editarProduto(id, nome, descricao, valor, estoqueMin) {
            document.getElementById('produtoId').value = id;
            document.getElementById('produtoNome').value = nome;
            document.getElementById('produtoDescricao').value = descricao;
            document.getElementById('produtoValor').value = valor;
            document.getElementById('produtoEstoqueMinimo').value = estoqueMin;
            document.getElementById('modalTitulo').textContent = 'Editar Produto';
            produtoModal.show();
        }

        async function salvarProduto(e) {
            e.preventDefault();

            const id = document.getElementById('produtoId').value;
            const dados = {
                nome: document.getElementById('produtoNome').value,
                descricao: document.getElementById('produtoDescricao').value,
                valor_unitario: parseFloat(document.getElementById('produtoValor').value),
                estoque_minimo: parseInt(document.getElementById('produtoEstoqueMinimo').value)
            };

            try {
                if (id) {
                    await api.put('/produtos/' + id, dados);
                } else {
                    await api.post('/produtos', dados);
                }
                produtoModal.hide();
                carregarProdutos();
            } catch (error) {
                alert('Erro ao salvar: ' + error.message);
            }
        }
    </script>
</body>

</html>
